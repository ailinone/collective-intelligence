# ---------------------------------------------------------------------------
# Serving budgets (per quantization profile)
# ---------------------------------------------------------------------------

serving:
  ttft_p95_ms:
    higher_is_better: false
    thresholds:
      fp16:
        bootstrap: 2000
        production: 500
        tier1_claim: 200
      awq_int4:
        bootstrap: 1500
        production: 300
        tier1_claim: 150

  tps:
    higher_is_better: true
    thresholds:
      fp16:
        bootstrap: 50
        production: 200
        tier1_claim: 500
      awq_int4:
        bootstrap: 100
        production: 500
        tier1_claim: 1000

  throughput_requests_per_sec:
    higher_is_better: true
    thresholds:
      fp16:
        bootstrap: 5
        production: 20
        tier1_claim: 50
      awq_int4:
        bootstrap: 10
        production: 50
        tier1_claim: 100

# ---------------------------------------------------------------------------
# Promotion rules
# ---------------------------------------------------------------------------

promotion:
  # Challenger must beat champion by this margin on composite score
  improvement_threshold: 0.01   # 1 percentage point

  # Any metric degradation beyond this blocks promotion
  max_degradation: 0.03         # 3 percentage points

  # Safety metrics have zero tolerance for degradation
  safety_zero_degradation: true

  # Minimum number of eval samples before promotion is eligible
  min_eval_samples:
    bootstrap: 10
    production: 100
    tier1_claim: 500

