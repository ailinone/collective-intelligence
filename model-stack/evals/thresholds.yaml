# ============================================================================
# Evaluation Thresholds — Tiered Acceptance Criteria
# ============================================================================
# Three tiers of acceptance for the Ailin model family:
#
# 1. Bootstrap: minimum to prove pipeline works (smoke test level)
# 2. Production: minimum to deploy for real traffic
# 3. Tier 1 Claim: minimum to claim frontier/SOTA competitive
#
# Thresholds are per-model-family (ailin-1b, ailin-3b, ailin-7b).
# Each metric specifies higher_is_better for correct comparison.
# ============================================================================

version: "2.0.0"

# ---------------------------------------------------------------------------
# Per-capability thresholds
# ---------------------------------------------------------------------------

capabilities:

  reasoning:
    metric: "gsm8k_accuracy"
    higher_is_better: true
    thresholds:
      ailin-1b:
        bootstrap: 0.15
        production: 0.40
        tier1_claim: 0.55
      ailin-3b:
        bootstrap: 0.25
        production: 0.55
        tier1_claim: 0.70
      ailin-7b:
        bootstrap: 0.35
        production: 0.65
        tier1_claim: 0.80

  coding:
