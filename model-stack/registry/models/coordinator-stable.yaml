# =============================================================================
# Ailin Coordinator Stable — 24-model ensemble registry
# =============================================================================
# This is a SEPARATE registry from `catalog.yaml` (which holds the ailin-*
# family of models we pretrain from scratch). The coordinator stable is
# composed of EXTERNAL open-source bases that we fine-tune (typically via
# LoRA + distillation from CI gateway logs) to act as routing/coordination
# specialists for the F4.1 audit substrate landed in api/.
#
# The 24-model design is structured as a 6×4 matrix:
#
#                 │ Encoder │ Dense ≤1B │ Dense 1-3B │ Dense 3-9B │ MoE Light │ MoE Heavy │
#   ──────────────┼─────────┼───────────┼────────────┼────────────┼───────────┼───────────┤
#   Generalist    │   m01   │   m05     │   m09      │   m13      │   m17     │   m21     │
#   Code          │   m02   │   m06     │   m10      │   m14      │   m18     │   m22     │
#   Reasoning     │   m03   │   m07     │   m11      │   m15      │   m19     │   m23     │
#   Routing/Safety│   m04   │   m08     │   m12      │   m16      │   m20     │   m24     │
#
# Voting: tiered cascade — Tier 1 (encoders) decides 70-80% alone via
# confidence threshold; only ambiguous cases escalate through Tier 2-6.
# See model-stack/serving/aggregation/tiered_voter.py.
#
# Audit substrate: each vote produces a RoleDecision with `schedulerName`
# and `decisionReason` that lands in collective_signals.decision_value
# (see api/src/core/orchestration/strategies/tri-role-collective-strategy.ts
# and api/src/core/coordination/collective-run-repository.ts).
# =============================================================================

version: "1.0.0"
family: "coordinator-stable"
total_models: 24

# Voting / cascade configuration ---------------------------------------------
ensemble:
  voting_strategy: "weighted_bayesian_majority"
  cascade:
    # Tier confidence thresholds — if reached, lower tiers don't run.
    # Calibrated empirically; tune via shadow-eval after first training run.
    tier_1_confidence_threshold: 0.85
    tier_2_confidence_threshold: 0.80
    tier_3_confidence_threshold: 0.75
    tier_4_confidence_threshold: 0.70
    tier_5_confidence_threshold: 0.65
    # Tier 6 always runs to completion when reached (ambiguity floor).
  tier_weights:
    # Weight applied to each tier's contribution in the final vote.
    # Tier 4 (dense 3-9B) is the "anchor" — best balance of cost and quality.
    # MoE Heavy (Tier 6) is bounded so it never single-handedly overrides.
    tier_1: 0.10
    tier_2: 0.15
    tier_3: 0.20
    tier_4: 0.25
    tier_5: 0.20
    tier_6: 0.10
  dissent:
    # Dissent threshold (count of models disagreeing with majority) that
    # triggers escalation to the next tier. Bounded by tier_*_confidence
    # threshold above; whichever fires first.
    escalate_threshold: 2

# Audit shape — what each vote must produce -----------------------------------
vote_schema:
  required_fields:
    - role          # the chosen RoleDecision.role
    - reason        # short stable token (e.g. "after-solver", "quality-fallback")
    - scheduler     # this model's identifier (e.g. "coord-m01-modernbert")
    - confidence    # 0.0 - 1.0 self-reported probability
  optional_fields:
    - rationale     # free-form justification (sanitized)
    - features      # extracted features the model used (for debugging)

