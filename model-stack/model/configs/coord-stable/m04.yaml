# Coord M04 — MiniLM (routing/safety encoder, Tier 1)
inherits: "_shared.yaml"

model_id: "m04"
display_name: "Coord M04 — MiniLM (routing/safety encoder)"
base_model: "sentence-transformers/all-MiniLM-L12-v2"
architecture: "encoder_only"
family: "minilm"
tier: 1
specialty: "routing_safety"

fine_tune:
  method: "full"               # tiny model — full fine-tune is cheap and effective
  # No LoRA-specific fields when method=full

training:
  num_epochs: 8                # smaller model needs more epochs
  learning_rate: 3.0e-4

data:
  partition_strategy: "by_specialty"
  specialty_filter: ["safety", "moderation", "routing", "general"]
  max_examples_per_label: 10000     # tier-1 coverage breadth matters

serving:
  quantization: "none"
  max_model_len: 256                # short context; this is a fast classifier

audit:
  scheduler_name_format: "coord-m04-minilm"
