# Coord M12 — LLaMA-3.2-1B (routing/safety, Tier 3)
inherits: "_shared.yaml"

model_id: "m12"
display_name: "Coord M12 — LLaMA-3.2-1B (routing/safety)"
base_model: "meta-llama/Llama-3.2-1B"
architecture: "decoder_only_transformer"
family: "llama-3"
tier: 3
specialty: "routing_safety"

fine_tune:
  method: "lora"
  rank: 32
  alpha: 64
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  num_epochs: 3
  learning_rate: 1.5e-4

data:
  partition_strategy: "by_specialty"
  specialty_filter: ["safety", "moderation", "routing"]
  max_examples_per_label: 6000

serving:
  quantization: "awq_int4"
  max_model_len: 2048

audit:
  scheduler_name_format: "coord-m12-llama-3.2-1b"

license_caveat: "Llama-3 license — review before commercial deploy >700M MAU"
