# Coord M11 — SmolLM2-1.7B (reasoning, Tier 3)
inherits: "_shared.yaml"

model_id: "m11"
display_name: "Coord M11 — SmolLM2-1.7B (reasoning)"
base_model: "HuggingFaceTB/SmolLM2-1.7B"
architecture: "decoder_only_transformer"
family: "smollm2"
tier: 3
specialty: "reasoning"

fine_tune:
  method: "lora"
  rank: 32
  alpha: 64
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  num_epochs: 3
  learning_rate: 2.0e-4         # SmolLM2 designed for fine-tune; tolerates higher LR

data:
  partition_strategy: "by_specialty"
  specialty_filter: ["analysis", "reasoning", "math"]
  max_examples_per_label: 5500

serving:
  quantization: "awq_int4"
  max_model_len: 2048

audit:
  scheduler_name_format: "coord-m11-smollm2-1.7b"
