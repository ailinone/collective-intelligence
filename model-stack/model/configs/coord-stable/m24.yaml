# Coord M24 — DBRX-base (routing/safety heavy, Tier 6 — premium fallback)
inherits: "_shared.yaml"

model_id: "m24"
display_name: "Coord M24 — DBRX-base (routing/safety heavy)"
base_model: "databricks/dbrx-base"
architecture: "moe_decoder"
family: "dbrx"
tier: 6
specialty: "routing_safety"
notes: "Cold-start only. Top-tier fallback for genuinely ambiguous cases."

moe:
  num_experts: 16
  experts_per_token: 4
  router_aux_loss_weight: 0.01

fine_tune:
  method: "moe_lora"
  rank: 32
  alpha: 64
  target_modules: ["Wqkv", "out_proj"]      # DBRX naming
  expert_target_modules: ["w1", "v1", "w2"]
  freeze_router: false

training:
  num_epochs: 1
  learning_rate: 3.0e-5
  micro_batch_size: 1
  gradient_accumulation_steps: 32           # very large model — accumulate more

data:
  partition_strategy: "by_specialty"
  specialty_filter: ["safety", "moderation", "routing"]
  max_examples_per_label: 4000

serving:
  quantization: "awq_int4"
  max_model_len: 4096
  tensor_parallel_size: 4                   # 132B requires multi-GPU even quantized
  pipeline_parallel_size: 1

license_caveat: "Databricks Open Model License — restrictions on competing uses; review before commercial deploy."

audit:
  scheduler_name_format: "coord-m24-dbrx-base"
