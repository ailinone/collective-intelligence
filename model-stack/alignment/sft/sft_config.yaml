# ──────────────────────────────────────────────────────────────
# Supervised Fine-Tuning (SFT) Configuration
# ──────────────────────────────────────────────────────────────

run_name: ailin-1b-sft
seed: 42

# ── Base model ────────────────────────────────────────────────
model:
  base_model: ./checkpoints/ailin-1b/step-100000
  tokenizer: ./tokenizer/ailin-32k
  torch_dtype: bf16
  attn_implementation: flash_attention_2   # flash_attention_2 | sdpa | eager

# ── Dataset ───────────────────────────────────────────────────
data:
  dataset_path: ./data/sft/instructions
  dataset_format: alpaca           # alpaca | sharegpt | messages
  max_length: 4096
  eval_split: 0.05
  preprocessing_num_workers: 8
  packing: true                    # pack multiple short examples into one sequence

# ── Training ──────────────────────────────────────────────────
training:
  epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  gradient_clipping: 1.0
  bf16: true
  tf32: true
  dataloader_num_workers: 4
  optim: adamw_torch

# ── LoRA ──────────────────────────────────────────────────────
lora:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

# ── Checkpointing ────────────────────────────────────────────
checkpointing:
  output_dir: ./checkpoints/ailin-1b-sft
  save_strategy: steps
  save_steps: 200
  save_total_limit: 5
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false

# ── Evaluation ────────────────────────────────────────────────
evaluation:
  eval_strategy: steps
  eval_steps: 100

# ── Logging ───────────────────────────────────────────────────
logging:
  logging_steps: 10
  report_to: wandb
  wandb:
    project: ailin-sft
    entity: null
    tags:
      - 1b
      - sft
      - lora

# ── Merge ─────────────────────────────────────────────────────
merge:
  merge_adapters: true
  output_dir: ./models/ailin-1b-sft-merged
  push_to_hub: false
