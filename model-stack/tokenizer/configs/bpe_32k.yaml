# ============================================================================
# BPE Tokenizer Configuration — 32k Vocabulary
# ============================================================================
# Designed for the Ailin model family. Trained with HuggingFace tokenizers.
# ============================================================================

tokenizer:
  algorithm: bpe
  vocab_size: 32000
  min_frequency: 2
  max_sequence_length: 4096

  # Special tokens (indices 0–5 reserved)
  special_tokens:
    - "<|pad|>"       # 0 — padding token
    - "<|eos|>"       # 1 — end of sequence / end of text
    - "<|bos|>"       # 2 — beginning of sequence
    - "<|unk|>"       # 3 — unknown token
    - "<|sep|>"       # 4 — separator between segments
    - "<|mask|>"      # 5 — masked token (for MLM-style objectives)
    - "<|system|>"    # 6 — system message marker
    - "<|user|>"      # 7 — user turn marker
    - "<|assistant|>" # 8 — assistant turn marker
    - "<|tool|>"      # 9 — tool call marker
    - "<|code|>"      # 10 — code block start
    - "<|/code|>"     # 11 — code block end
    - "<|fim_prefix|>"  # 12 — fill-in-the-middle prefix
    - "<|fim_middle|>"  # 13 — fill-in-the-middle middle
    - "<|fim_suffix|>"  # 14 — fill-in-the-middle suffix

  # Pre-tokenization
  pre_tokenizer:
    type: byte_level
    add_prefix_space: false
    use_regex: true
    # GPT-4 style regex splitting pattern
    regex_pattern: "(?i:'s|'t|'re|'ve|'m|'ll|'d)|[^\\r\\n\\p{L}\\p{N}]?\\p{L}+|\\p{N}{1,3}| ?[^\\s\\p{L}\\p{N}]+[\\r\\n]*|\\s*[\\r\\n]+|\\s+(?!\\S)|\\s+"

  # Normalization
  normalizer:
    type: sequence
    steps:
      - type: nfc     # Unicode NFC normalization
      - type: lowercase_accent_strip
        enabled: false  # Disabled — we want case-sensitive tokenization

  # Decoder
  decoder:
    type: byte_level

  # Post-processor (adds BOS/EOS)
  post_processor:
    type: template
    single: "<|bos|> $A <|eos|>"
    pair: "<|bos|> $A <|sep|> $B <|eos|>"
    special_tokens:
      "<|bos|>": 2
      "<|eos|>": 1
      "<|sep|>": 4

# Training parameters
training:
  # Corpus configuration
  corpus_paths: []  # Filled at training time
  max_corpus_size_gb: 20  # Subsample if corpus exceeds this
  sample_ratio: 1.0

  # BPE training settings
  initial_alphabet_from_corpus: true
  show_progress: true
  limit_alphabet: 1000  # Max initial alphabet size

  # Byte-fallback for OOV
  byte_fallback: true
  # Whether to add individual bytes as tokens (256 byte tokens)
  add_byte_tokens: true

# Evaluation
evaluation:
  eval_languages:
    - en
    - zh
    - de
    - fr
    - es
    - ja
    - ko
    - ru
    - ar
    - hi
  metrics:
    - fertility           # Tokens per word
    - compression_ratio   # Bytes per token
    - vocab_coverage      # % of vocab used on eval set
    - unknown_rate         # % of <unk> tokens
    - sequence_length_p95 # 95th percentile sequence length
