name: DCO

# Every commit in a PR must carry a Signed-off-by trailer (git commit -s),
# certifying the Developer Certificate of Origin 1.1 (see DCO.md).
# Implemented with plain git — no third-party action in the trust chain.
on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    name: Signed-off-by check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Verify every PR commit is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          while read -r sha; do
            if ! git log -1 --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha is missing a Signed-off-by trailer (use: git commit -s)"
              missing=$((missing + 1))
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "$missing" -gt 0 ]; then
            echo "✗ $missing commit(s) missing DCO sign-off — see DCO.md"
            exit 1
          fi
          echo "✓ all commits signed off"
