# Auto-merged by `docker compose` when present (compose override convention).
# Injects docker/.env into the api container so provider keys set there
# (OPENAI_API_KEY, ANTHROPIC_API_KEY, OLLAMA_URL, ...) reach the app — the
# base compose intentionally avoids env_file so secret-manager-based deploys
# stay authoritative; for the local quickstart, your .env IS the source of
# truth. Values already present in the container env are skipped by the
# secrets loader, which is exactly what a local setup wants.
services:
  api:
    env_file:
      - path: .env
        required: false
