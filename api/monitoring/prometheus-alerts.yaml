## 🎯 SLA-Based Alerts

### 99.9% Uptime SLA

Allows 8.76 hours downtime/year = ~43 minutes/month

**Alert if approaching SLA breach:**

```yaml
- alert: SLABudgetBurning
  expr: |
    (
      sum(increase(ailin_dev_http_request_errors_total{job="ailin-dev-api"}[30d]))
      /
      sum(increase(ailin_dev_http_requests_total{job="ailin-dev-api"}[30d]))
    ) > 0.001
  labels:
    severity: warning
  annotations:
    summary: "Approaching 99.9% uptime SLA limit"
    description: "Error budget: {{ $value | humanizePercentage }} used this month"
```

