## 🔗 Integration

### Send Alerts to Multiple Channels

**Critical (P0):**
- PagerDuty → Pages on-call engineer
- Slack #incidents → Notifies team
- Email → Sends to ops@example.com

**Warning (P1):**
- Slack #monitoring → Creates ticket
- Jira → Auto-creates issue

**Info (P2):**
- Slack #monitoring → Logs for review

