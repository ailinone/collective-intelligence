## 📊 Alert Tuning

### Avoid False Positives

**Too Sensitive:**
```yaml
# ❌ BAD: Alert on every single error
expr: ailin_dev_http_request_errors_total > 0
```

**Properly Tuned:**
```yaml
# ✅ GOOD: Alert on sustained high error rate
expr: (rate(ailin_dev_http_request_errors_total[5m]) / rate(ailin_dev_http_requests_total[5m])) > 0.01
for: 5m
```

### Avoid Alert Fatigue

**Best Practices:**
1. **Use `for` clause:** Wait for sustained issues (not transient spikes)
2. **Set realistic thresholds:** Based on actual baseline metrics
3. **Group related alerts:** Don't alert on symptoms AND root cause
4. **Document runbooks:** Every alert should have fix instructions

