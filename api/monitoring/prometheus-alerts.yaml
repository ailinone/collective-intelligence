## 📈 Metrics to Track (Prometheus)

**RED Method (Requests, Errors, Duration):**
- `ailin_dev_http_requests_total` - Request count
- `ailin_dev_http_request_errors_total` - Error count
- `ailin_dev_http_request_duration_seconds` - Latency histogram

**USE Method (Utilization, Saturation, Errors):**
- `ailin_dev_process_cpu_seconds_total` - CPU utilization (prom-client default)
- `ailin_dev_nodejs_heap_size_used_bytes` - Heap memory utilization (prom-client default)
- `ailin_dev_process_resident_memory_bytes` - RSS memory

**Custom Business Metrics:**
- `ailin_dev_llm_cost_usd_total` - Provider/LLM costs
- `ci_model_execution_total` - Per-model executions (provider reliability)
- `ci_model_selection_total` - Model-selection decisions by reason
- `provider_error_class_total` - Provider errors by class (e.g. rate_limited)

