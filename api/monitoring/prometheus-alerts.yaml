## 🚀 Deployment

### Option 1: Prometheus Alertmanager (Self-Hosted)

```bash
# Install Prometheus
helm install prometheus prometheus-community/prometheus \
  --set alertmanager.enabled=true

# Apply alert rules
kubectl apply -f monitoring/prometheus-alerts.yaml
```

### Option 2: Google Cloud Monitoring (Managed)

```bash
# Create alert policies via gcloud
gcloud alpha monitoring policies create \
  --notification-channels=<channel-id> \
  --display-name="API High Error Rate" \
  --condition-threshold-value=0.01 \
  --condition-threshold-duration=300s \
  --condition-filter='resource.type="cloud_run_revision" AND metric.type="run.googleapis.com/request_count"'
```

### Option 3: Grafana Cloud (Managed)

1. Sign up at https://grafana.com/products/cloud/
2. Connect Prometheus datasource
3. Import alert rules
4. Configure contact points (Slack, PagerDuty, email)

