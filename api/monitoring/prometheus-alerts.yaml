## 📞 Alert Routing

### Slack Integration

```yaml
# alertmanager.yml
route:
  receiver: 'slack-default'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-oncall'
      continue: true
    
    - match:
        severity: critical
      receiver: 'slack-critical'
    
    - match:
        severity: warning
      receiver: 'slack-warnings'
    
    - match:
        severity: info
      receiver: 'slack-info'

receivers:
  - name: 'pagerduty-oncall'
    pagerduty_configs:
      - service_key: '<pagerduty-key>'
        description: '{{ .GroupLabels.alertname }} - {{ .Annotations.summary }}'
  
  - name: 'slack-critical'
    slack_configs:
      - api_url: '<webhook-url>'
        channel: '#incidents'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ .Annotations.description }}'
  
  - name: 'slack-warnings'
    slack_configs:
      - api_url: '<webhook-url>'
        channel: '#monitoring'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
  
  - name: 'slack-info'
    slack_configs:
      - api_url: '<webhook-url>'
        channel: '#monitoring'
        title: 'ℹ️ INFO: {{ .GroupLabels.alertname }}'
```

