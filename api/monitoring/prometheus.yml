# Prometheus configuration for Ailin Dev API

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ailin-dev'
    environment: 'development'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load rules
rule_files:
  # - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Ailin Dev API metrics
  - job_name: 'ailin-dev-api'
    scrape_interval: 10s
    static_configs:
      - targets: ['api:9464']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ailin-dev-api'

  # PostgreSQL metrics (if pg_exporter is running)
  - job_name: 'postgres'
    static_configs:
      - targets: []
        # - postgres-exporter:9187

  # Redis metrics (if redis_exporter is running)
  - job_name: 'redis'
    static_configs:
      - targets: []
        # - redis-exporter:9121

