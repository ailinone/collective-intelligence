    post:
      summary: Create run
      tags:
        - Threads
      description: Creates a new run to execute an assistant on a thread. A run
        processes all messages in the thread and generates assistant responses,
        executing tools as needed. The run will execute asynchronously and can
        be monitored via the get run endpoint. Supports streaming for real-time
        updates.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - assistant_id
              properties:
                assistant_id:
                  type: string
