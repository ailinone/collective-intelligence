  "/v1/threads/{thread_id}/runs/{run_id}/submit_tool_outputs":
    post:
      summary: Submit tool outputs
      tags:
        - Threads
      description: Submits tool execution results for a run that is waiting for action
        (status "requires_action"). When an assistant uses function/tool calling
        during a run, the run pauses and requires tool outputs to continue. This
        endpoint allows providing those outputs to resume the run execution.
        Each tool_output must correspond to a tool_call_id from the run's
        required_action.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - tool_outputs
              properties:
                tool_outputs:
                  type: array
                  items:
                    type: object
                    required:
                      - tool_call_id
                    properties:
                      tool_call_id:
                        type: string
                        description: ID of the tool call that this output is for. Must match a
                          tool_call_id from the run's required_action.
                      output:
                        type: string
                        description: Output from the tool execution. Required if error is not provided.
                      error:
                        type: string
                        description: Error message if the tool execution failed. Required if output is
                          not provided.
                stream:
                  type: boolean
                  description: Enable streaming responses
        required: true
      parameters:
        - schema:
            type: string
          in: path
          name: thread_id
          required: true
          description: The ID of the thread
        - schema:
            type: string
          in: path
          name: run_id
          required: true
          description: The ID of the run
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Tool outputs submitted successfully, run will continue
          content:
            application/json:
              schema:
                description: Tool outputs submitted successfully, run will continue
                type: object
                properties:
                  id:
                    type: string
                    description: Run ID
                  object:
                    type: string
                    enum:
                      - thread.run
                    description: Object type identifier
                  created_at:
                    type: integer
                    description: Unix timestamp when the run was created
                  thread_id:
                    type: string
                    description: ID of the thread this run belongs to
                  assistant_id:
                    type: string
                    description: ID of the assistant used for this run
                  status:
                    type: string
                    description: Run status after tool outputs submission. Typically "in_progress"
