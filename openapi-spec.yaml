      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-Request-Id:
          description: Unique request identifier for end-to-end tracing.
          schema:
            type: string
        X-Correlation-Id:
          description: Correlation identifier propagated across internal services.
          schema:
            type: string
      x-error-code: forbidden
    NotFound:
