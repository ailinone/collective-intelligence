    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - requestId
        - correlationId
        - timestamp
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            type:
              type: string
            param:
              type: string
        requestId:
          type: string
        correlationId:
          type: string
        timestamp:
          type: string
          format: date-time
  responses:
    BadRequest:
      description: Bad request
