      description: Login with email verification code
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - challengeId
                - code
              properties:
                challengeId:
                  type: string
                  minLength: 1
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  pattern: ^[0-9]{6}$
        required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      organizationId:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                  tokens:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
                      expiresIn:
                        type: number
