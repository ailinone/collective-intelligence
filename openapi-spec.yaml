    post:
      summary: Search vector store
      tags:
        - Vector Stores
      description: Run a semantic similarity search over a vector store. The query is
        embedded and ranked against the store's chunk embeddings using cosine
        similarity (pgvector HNSW). Returns the most relevant chunks with their
        similarity scores. Scoped to the calling organization.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  minLength: 1
                  description: Natural-language query to search for
                top_k:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 10
                  description: Number of top-scoring chunks to return (1-100, default 10)
                file_ids:
                  type: array
                  items:
                    type: string
                  description: "Optional: restrict the search to chunks from these file IDs within
                    the store"
        required: true
      parameters:
        - schema:
            type: string
          in: path
          name: vector_store_id
          required: true
          description: Unique identifier of the vector store to search
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Search results ordered by descending similarity score
          content:
            application/json:
              schema:
                description: Search results ordered by descending similarity score
                type: object
                properties:
                  object:
                    type: string
                    enum:
                      - vector_store.search_results
                  search_query:
                    type: string
                    description: Echo of the submitted query
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        file_id:
                          type: string
                          description: ID of the file this chunk came from
                        score:
                          type: number
                          description: Cosine similarity in [0,1] (1 = identical)
                        content:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                                enum:
                                  - text
                              text:
                                type: string
                                description: The matched chunk text
                        chunk_index:
                          type: integer
                          description: Zero-based position of the chunk within its file
                        metadata:
                          type: object
                          description: Chunk metadata (e.g. source filename)
                  has_more:
                    type: boolean
                  next_page:
                    type: string
                    nullable: true
          headers:
            X-Request-Id:
              description: Unique request identifier for end-to-end tracing.
