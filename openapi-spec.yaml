            application/json:
              schema:
                description: Run cancelled successfully
                type: object
                properties:
                  id:
                    type: string
                    description: Run ID
                  object:
                    type: string
                    enum:
                      - thread.run
                    description: Object type identifier
                  created_at:
                    type: integer
                    description: Unix timestamp when the run was created
                  thread_id:
                    type: string
                    description: ID of the thread this run belongs to
                  assistant_id:
                    type: string
                    description: ID of the assistant used for this run
                  status:
                    type: string
                    enum:
                      - cancelled
