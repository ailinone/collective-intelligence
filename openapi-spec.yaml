  /v1/responses:
    post:
      summary: Create a response
      tags:
        - Responses
      description: OpenAI Responses API compatible endpoint. Creates a model response
        for the given input with optional tool calling and web search.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - input
              properties:
                model:
                  type: string
                  description: Model ID, "auto", or Ailin virtual aliases (e.g., "ailin-auto",
                    "ailin-best", "ailin-fast", "ailin-economy",
                    "ailin-consensus"). Aliases resolve to autonomous
                    orchestration profiles over dynamically discovered provider
                    models.
                input:
                  anyOf:
                    - type: string
                      description: Input text as a single string. Simple format for text-only
                        requests.
                    - type: array
                      description: Array of input items supporting messages and item references. More
                        flexible format for complex inputs.
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                              - message
                              - item_reference
                            description: "Item type: message (conversation message) or item_reference
                              (reference to existing item)"
                          role:
                            type: string
                            enum:
                              - user
                              - assistant
                              - system
                            description: "Message role: user (human input), assistant (AI response), system
                              (instructions). Required for message type."
                          content:
                            anyOf:
                              - type: string
                                description: Text content as a string
                              - type: array
                                description: Multimodal content array (text blocks, images, etc.)
                                items:
                                  type: object
                                  description: Content block object. Can contain text, image_url, or other
                                    multimodal content types.
                                  properties:
                                    type:
                                      type: string
                                      description: "Content block type: text, image_url, etc."
                                    text:
                                      type: string
                                      description: Text content (for text type blocks)
                                    image_url:
                                      type: object
                                      description: Image URL object (for image_url type blocks)
                            description: Message content. Can be a string or array of content blocks.
                          id:
                            type: string
                            description: Item ID for referencing. Required for item_reference type.
                instructions:
                  type: string
                  description: System instructions to guide the model's behavior and response
                    style
                tools:
                  type: array
                  description: Array of tools available to the model for function calling
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - function
                          - web_search
                          - file_search
                          - code_interpreter
                        description: "Tool type: function (custom function), web_search (web search),
                          file_search (RAG), or code_interpreter (Python
                          execution)"
                      function:
                        type: object
                        description: Function tool definition (required when type is "function").
                          Contains name, description, and parameters schema.
                      web_search:
                        type: object
                        description: Web search tool configuration (required when type is "web_search")
                tool_choice:
                  oneOf:
                    - type: string
                      enum:
                        - auto
                        - none
                        - required
                      description: "Tool choice mode: auto (let model decide), none (no tools),
                        required (must use tools)"
                    - type: object
                      description: Specific tool choice configuration object
                  description: Controls which tools (if any) the model can use. Can be a string
                    ("auto", "none", "required") or an object specifying
                    specific tools.
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                max_output_tokens:
                  type: integer
                  minimum: 1
                top_p:
                  type: number
                  minimum: 0
                  maximum: 1
                stream:
                  type: boolean
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                strategy:
                  type: string
                  enum:
                    - single
                    - cost
                    - speed
                    - quality
                    - balanced
                    - parallel
                    - debate
                    - quality_multipass
                    - dynamic
                    - quality-multi-pass
                    - quality-multipass
                    - auto
                  description: "Canonical strategy contract with compatibility aliases. Canonical:
                    single, cost, speed, quality, balanced, parallel, debate,
                    quality_multipass, dynamic."
                quality_target:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: Target quality level (0-1). Higher values prioritize quality over
                    speed/cost. Used in orchestration decisions.
                max_cost:
                  type: number
                  minimum: 0
                  description: Maximum cost threshold (in USD). Orchestration will not exceed this
                    cost.
        required: true
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Response created successfully
          content:
            application/json:
              schema:
                description: Response created successfully
                type: object
                properties:
                  id:
                    type: string
                    description: Response ID
                  object:
                    type: string
                    enum:
                      - response
                    description: Object type
                  created_at:
                    type: integer
                    description: Unix timestamp of creation
                  model:
                    type: string
                    description: Model used for response
                  status:
                    type: string
                    enum:
                      - completed
                      - in_progress
                      - failed
                    description: Response status
                  output:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - message
                            - item_reference
                        role:
                          type: string
                        content:
                          oneOf:
                            - type: string
                            - type: array
                              items:
                                type: object
                                additionalProperties: true
                        id:
                          type: string
                    description: Response output items
                  usage:
                    type: object
                    properties:
                      input_tokens:
                        type: integer
                      output_tokens:
                        type: integer
                      total_tokens:
                        type: integer
                  metadata:
                    type: object
                    additionalProperties:
                      type: string
                    description: Response metadata
                  ailin_metadata:
                    type: object
                    properties:
                      models_used:
                        type: array
                        items:
                          type: string
                      strategy_used:
                        type: string
                      resolved_strategy:
                        type: string
                      resolved_model:
                        type: string
                      final_decider_model_id:
                        type: string
                      final_decider_model_name:
                        type: string
                      final_decider_role:
                        type: string
                      fallback_chain:
                        type: array
                        items:
                          type: string
                      total_cost:
                        type: number
                      total_duration_ms:
                        type: number
                    additionalProperties: true
          headers:
            X-Request-Id:
              description: Unique request identifier for end-to-end tracing.
              schema:
                type: string
            X-Correlation-Id:
              description: Correlation identifier propagated across internal services.
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
