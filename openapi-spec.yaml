    post:
      summary: Create thread
      tags:
        - Threads
      description: Create a new conversation thread. Threads represent conversations
        between a user and an assistant.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  description: Initial messages for the thread. Messages establish conversation
                    context and can include text, images, and file attachments.
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                          - system
                          - tool
                        description: "Message role: user (human input), assistant (AI response), system
                          (instructions), tool (tool execution results)"
                      content:
                        oneOf:
                          - type: string
                            description: Text content as a string
                          - type: array
                            description: Multimodal content array supporting text and images
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - text
                                    - image_url
                                  description: "Content type: text or image_url"
                                text:
                                  type: string
                                  description: Text content (required when type is "text")
                                image_url:
                                  type: object
                                  description: Image URL object (required when type is "image_url")
                                  properties:
                                    url:
                                      type: string
                                      description: Image URL (must be publicly accessible or use data URI)
                                    detail:
                                      type: string
                                      enum:
                                        - low
                                        - high
                                        - auto
