  /v1/chat/completions/intelligent:
    post:
      summary: Create chat completion with intelligent selection
      tags:
        - Chat
        - Intelligent
      description: Chat completion with intelligent model selection, triage, and
        unlimited fallback. Uses advanced AI to analyze requirements and
        automatically select the best model, with automatic failover to
        alternative models if needed.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  description: Model ID (e.g., "gpt-4", "claude-3-opus"), "auto", or Ailin virtual
                    aliases (e.g., "ailin-auto", "ailin-best", "ailin-fast",
                    "ailin-economy", "ailin-consensus"). Virtual aliases map to
                    autonomous orchestration profiles and still use dynamic
                    provider/model discovery.
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum:
                          - system
                          - user
                          - assistant
                          - function
                          - tool
                        description: "Message role: system (instructions), user (user input), assistant
                          (model response), function/tool (tool results)"
                      content:
                        oneOf:
                          - type: string
                            description: Text content
                          - type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - text
                                    - image_url
                                  description: "Content part type: text (plain text) or image_url (image
                                    reference)"
                                text:
                                  type: string
                                  description: Text content (required when type is "text")
                                image_url:
                                  type: object
                                  description: Image URL object (required when type is "image_url")
                                  properties:
                                    url:
                                      type: string
                                      description: Image URL (must be publicly accessible or use data URI format)
                                    detail:
                                      type: string
                                      enum:
                                        - low
                                        - high
                                        - auto
                                      description: "Image detail level: low (cost-effective, 512x512), high (full
                                        resolution), auto (adaptive based on
                                        image size)"
                            description: Array of content parts (text and/or images) for multimodal messages
                          - type: object
                            properties:
                              type:
                                type: string
                                description: Content type (e.g., "text", "image_url")
                              text:
                                type: string
                                description: Text content (when type is "text")
                              image_url:
                                type: object
                                description: Image URL object (when type is "image_url")
                            additionalProperties: true
                            description: Content object format (alternative to array format for multimodal
                              content)
                        description: Message content (string, array of parts, or object)
                      name:
                        type: string
                        description: Optional name for the message (for function/tool messages)
                      tool_calls:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                        description: Tool calls made by the assistant
                      tool_call_id:
                        type: string
                        description: ID of the tool call this message responds to
                  minItems: 1
                  description: Array of messages in the conversation. Must contain at least one
                    message.
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                  default: 1
                  description: Sampling temperature (0-2). Higher values make output more random.
                    Lower values make it more focused and deterministic.
                max_tokens:
                  type: integer
                  minimum: 1
                  description: Maximum number of tokens to generate in the completion.
                    Model-dependent limits apply.
                top_p:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: Nucleus sampling parameter. Consider tokens with top_p probability
                    mass. Alternative to temperature.
                frequency_penalty:
                  type: number
                  minimum: -2
                  maximum: 2
                  default: 0
                  description: Penalty for frequent tokens (-2 to 2). Positive values reduce
                    repetition.
                presence_penalty:
                  type: number
                  minimum: -2
                  maximum: 2
                  default: 0
                  description: Penalty for new topics (-2 to 2). Positive values encourage new
                    topics.
                stop:
                  oneOf:
                    - type: string
                      description: Single stop sequence
                    - type: array
                      items:
                        type: string
                      maxItems: 4
                      description: Up to 4 stop sequences
                  description: Stop sequences. Generation stops when any sequence is encountered.
                stream:
                  type: boolean
                  default: false
                  description: Enable streaming mode. Returns Server-Sent Events (SSE) stream of
                    completion chunks.
                tools:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - function
                      function:
                        type: object
                        description: Function tool definition. Required when type is "function".
                        properties:
                          name:
                            type: string
                            description: Function name (must be unique, lowercase/underscore, a-z, 0-9, _).
                              Used by the model to identify which function to
                              call.
                          description:
                            type: string
                            description: Function description explaining what the function does. The model
                              uses this to decide when to call the function.
                          parameters:
                            type: object
                            additionalProperties: true
                            description: JSON Schema object defining function parameters. Must be valid JSON
                              Schema describing the expected input structure.
                  description: List of tools (functions) available to the model. Model may choose
                    to call these tools.
                tool_choice:
                  oneOf:
                    - type: string
                      enum:
                        - none
                        - auto
                      description: "Tool choice mode: none (no tools) or auto (model decides)"
                    - type: object
                      additionalProperties: true
                      description: Force specific tool call
                  description: Controls which tool (if any) the model calls. "none" disables
                    tools, "auto" lets model decide.
                response_format:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - json_object
                        - text
                  description: 'Response format. Use { type: "json_object" } to force JSON
                    output.'
                strategy:
                  type: string
                  enum:
                    - single
                    - cost
                    - speed
                    - quality
                    - balanced
                    - parallel
                    - debate
                    - quality_multipass
                    - dynamic
                    - quality-multi-pass
                    - quality-multipass
                    - auto
                  description: "Ailin-specific: Canonical strategy contract with compatibility
                    aliases. Canonical: single, cost, speed, quality, balanced,
                    parallel, debate, quality_multipass, dynamic."
                max_cost:
                  type: number
                  minimum: 0
                  description: "Ailin-specific: Maximum cost in USD for this request.
                    Orchestration will select models within budget."
                quality_target:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: "Ailin-specific: Quality target (0-1). Higher values prioritize
                    quality over cost/speed."
                task_type:
                  type: string
                  description: 'Ailin-specific: Task type hint (e.g., "code-generation",
                    "analysis", "creative") for better model selection'
              required:
                - messages
              additionalProperties: true
        required: true
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Chat completion completed successfully
          content:
            application/json:
              schema:
                description: Chat completion completed successfully
                type: object
                required:
                  - id
                  - object
                  - created
                  - model
                  - choices
                  - usage
                additionalProperties: true
                properties:
                  id:
                    type: string
                    description: Unique identifier for the completion
                  object:
                    type: string
                    description: Object type identifier (always "chat.completion")
                  created:
                    type: integer
                    description: Unix timestamp when the completion was created
                  model:
                    type: string
                    description: Model ID used for this completion
                  choices:
                    type: array
                    description: Array of completion choices. Usually contains one choice unless n >
                      1
                    items:
                      type: object
                      required:
                        - index
                        - message
                        - finish_reason
                      additionalProperties: true
                      description: A completion choice containing the generated message
                      properties:
                        index:
                          type: integer
                          description: Index of the choice (0-based)
                        finish_reason:
                          type: string
                          description: "Reason for completion: stop (natural end), length (token limit),
                            tool_calls (tool usage required), content_filter
                            (content filtered), or function_call (deprecated)"
                        logprobs:
                          description: Log probability information for tokens
                          type: object
                          additionalProperties: true
                          nullable: true
                        message:
                          type: object
                          required:
                            - role
                            - content
                          additionalProperties: true
                          description: The generated message from the model
                          properties:
                            role:
                              type: string
                              description: "Message role: assistant (model response)"
                            content:
                              oneOf:
                                - type: string
                                  description: Text content as a string
                                - type: array
                                  description: Array of content parts (for multimodal responses)
                                  items:
                                    type: object
                                    additionalProperties: true
                                    description: Content part object (text, image_url, etc.)
                              description: Message content (string or array of parts)
                            refusal:
                              description: Reason why the model refused to respond (safety/content policy)
                              type: string
                              nullable: true
                            tool_calls:
                              description: Array of tool calls made by the model
                              type: array
                              items:
                                type: object
                                additionalProperties: true
                                description: Tool call object containing function name and arguments
                              nullable: true
                  usage:
                    type: object
                    required:
                      - prompt_tokens
                      - completion_tokens
                      - total_tokens
                    additionalProperties: true
                    description: Token usage statistics for this completion
                    properties:
                      prompt_tokens:
                        type: integer
                        description: Number of tokens in the prompt
                      completion_tokens:
                        type: integer
                        description: Number of tokens in the completion
                      total_tokens:
                        type: integer
                        description: Total tokens used (prompt + completion)
                  system_fingerprint:
                    description: System fingerprint for reproducibility
                    type: string
                    nullable: true
                  ailin_metadata:
                    type: object
                    additionalProperties: true
                    description: Ailin-specific metadata about the completion (model used, provider,
                      cost, etc.)
          headers:
            X-Request-Id:
              description: Unique request identifier for end-to-end tracing.
              schema:
                type: string
            X-Correlation-Id:
              description: Correlation identifier propagated across internal services.
              schema:
                type: string
