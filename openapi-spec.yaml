                model:
                  type: string
                  description: Override model for this run
                instructions:
                  type: string
                  description: Override instructions for this run
                additional_instructions:
                  type: string
                  description: Additional instructions
                tools:
                  type: array
                  description: Override tools for this run
                  items:
                    type: object
                    additionalProperties: true
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional metadata key-value pairs for the run
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                  description: Sampling temperature (0-2). Higher values make output more random.
                    Lower values make it more focused.
                top_p:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: Nucleus sampling parameter (0-1). Consider tokens with cumulative
                    probability up to this threshold.
                stream:
                  type: boolean
                  description: Enable streaming
