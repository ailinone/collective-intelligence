        "queued" can be cancelled. Once cancelled, the run status changes to
        "cancelling" (immediate) or "cancelled" (final). The run will stop
        processing and no further assistant responses will be generated. Use
        this endpoint to halt long-running runs or when user input is needed to
        proceed. This is useful for stopping expensive operations or when a user
        changes their mind about a request.
